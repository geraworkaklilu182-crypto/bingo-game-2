<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dashboard - GREAT BINGO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Container */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header with Logo and User */
        .main-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 32px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Navigation Menu */
        .nav-menu {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 18px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            background: rgba(255,215,0,0.3);
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }

        /* User Section */
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .logout-btn {
            padding: 8px 18px;
            background: rgba(220,53,69,0.8);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #dc3545;
            transform: translateY(-2px);
        }

        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.1));
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .welcome-banner h1 {
            font-size: 28px;
            color: white;
            margin-bottom: 8px;
        }

        .welcome-banner h1 span {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-banner p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        /* Stats Grid - 4 Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,215,0,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Section Title */
        .section-title {
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title span {
            font-size: 24px;
        }

        /* Quick Actions Grid */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .action-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .action-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            background: rgba(0,0,0,0.6);
        }

        .action-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .action-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .actions-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .main-header {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-menu {
                justify-content: center;
            }
            
            .welcome-banner h1 {
                font-size: 22px;
            }
        }

        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            body {
                padding: 10px;
            }
            
            .stat-value {
                font-size: 28px;
            }
            
            .action-icon {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="main-header">
            <div class="logo">
                <span class="logo-icon">🎯</span>
                <span class="logo-text">GREAT BINGO</span>
            </div>
            
            <div class="nav-menu">
                <button class="nav-link active" onclick="window.location.href='/dashboard.html'">
                    📊 Dashboard
                </button>
                
                <button class="nav-link" onclick="window.location.href='/card-selection.html'">
                 🎮 PLAY NOW 2
                 </button>

                <button class="nav-link" onclick="window.location.href='/multiplayer-arena.html'"> 
                    🎮 PLAY NOW 1
                    
                </button>

                <button class="nav-link" onclick="window.location.href='/single-game.html'">
                    🎮 PLAY NOW
                </button>

                <button class="nav-link" onclick="window.location.href='/history.html'">
                    📜 History
                </button>
                <button class="nav-link" onclick="window.location.href='/profile.html'">
                    👤 Profile
                </button>
                <button id="adminNav" class="nav-link" style="display:none;" onclick="window.location.href='/admin.html'">
                    👑 Admin
                </button>
                <button class="nav-link" onclick="window.location.href='/wallet.html'">
                    💰 Wallet
                </button>
                <button class="nav-link" onclick="window.location.href='/how-to-play.html'">
                    📖 Rules
                </button>
            </div>
            
            <div class="user-section">
                <div class="user-avatar" id="userAvatar">G</div>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <!-- Welcome Banner -->
        <div class="welcome-banner">
            <h1>Welcome back, <span id="username">Player</span>! 🎉</h1>
            <p>Ready to play Bingo? Check your stats and start a new game!</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-value" id="totalScore">0</div>
                <div class="stat-label">TOTAL SCORE</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎮</div>
                <div class="stat-value" id="gamesPlayed">0</div>
                <div class="stat-label">GAMES PLAYED</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✨</div>
                <div class="stat-value" id="gamesWon">0</div>
                <div class="stat-label">GAMES WON</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="winRate">0%</div>
                <div class="stat-label">WIN RATE</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="section-title">
            <span>⚡</span> Quick Actions
        </div>
        <div class="actions-grid">
            <div class="action-card" onclick="startGame()">
                <div class="action-icon">🎮</div>
                <div class="action-title">PLAY NOW</div>
                <div class="action-desc">Start a new Bingo game</div>
            </div>
            <div class="action-card" onclick="viewHistory()">
                <div class="action-icon">📜</div>
                <div class="action-title">Game History</div>
                <div class="action-desc">View your past games</div>
            </div>
            <div class="action-card" onclick="viewProfile()">
                <div class="action-icon">⚙️</div>
                <div class="action-title">Settings</div>
                <div class="action-desc">Manage your profile</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        async function loadUserData() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }
                
                const user = await response.json();
                
                document.getElementById('username').textContent = user.username;
                document.getElementById('totalScore').textContent = user.total_score || 0;
                document.getElementById('gamesPlayed').textContent = user.games_played || 0;
                document.getElementById('gamesWon').textContent = user.games_won || 0;
                
                const winRate = user.games_played > 0 
                    ? ((user.games_won / user.games_played) * 100).toFixed(1)
                    : 0;
                document.getElementById('winRate').textContent = `${winRate}%`;
                
                // Update avatar with first letter
                const avatar = document.getElementById('userAvatar');
                avatar.textContent = user.username.charAt(0).toUpperCase();
                
                // Show admin nav if user is admin
                if (user.role === 'admin') {
                    document.getElementById('adminNav').style.display = 'flex';
                }
                
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
        
        function startGame() {
            window.location.href = '/multiplayer-arena.html';
        }
        
        function viewHistory() {
            window.location.href = '/history.html';
        }
        
        function viewProfile() {
            window.location.href = '/profile.html';
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }
        
        loadUserData();
    </script>
</body>
</html>
