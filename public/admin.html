<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Panel - DIL BINGO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #0d0d0d;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,215,0,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
        }

        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            padding-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: none;
            cursor: pointer;
            font-size: 14px;
            border-radius: 30px;
            color: #ccc;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            font-weight: bold;
        }

        .tab-btn:hover {
            background: rgba(255,215,0,0.2);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255,215,0,0.3);
        }

        .stat-card h3 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0a0a0a;
            border-radius: 10px;
            overflow-x: auto;
            display: block;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: white;
        }

        th {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            font-weight: bold;
        }

        .role-select {
            padding: 6px 10px;
            border-radius: 8px;
            background: #1a1a1a;
            color: white;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            padding: 5px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .save-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }

        .admin-setting {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255,215,0,0.1);
        }

        .admin-setting label {
            color: #ffd700;
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .admin-setting input, .admin-setting select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,215,0,0.3);
            background: #1a1a1a;
            color: white;
            margin-right: 10px;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            width: auto;
        }

        .btn-secondary:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-2px);
        }

        h3 {
            color: #ffd700;
            margin: 20px 0 15px 0;
            font-size: 18px;
        }

        /* Scrollbar */
        .table-responsive {
            overflow-x: auto;
            border-radius: 10px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            .admin-tabs {
                gap: 8px;
            }

            .tab-btn {
                padding: 6px 14px;
                font-size: 12px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .stat-card .number {
                font-size: 24px;
            }

            .stat-card h3 {
                font-size: 11px;
            }

            th, td {
                padding: 8px;
                font-size: 12px;
            }

            .admin-setting {
                padding: 15px;
            }

            .save-btn {
                padding: 8px 16px;
                font-size: 12px;
            }

            .btn-secondary {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .admin-tabs {
                flex-direction: column;
                align-items: stretch;
            }

            .tab-btn {
                text-align: center;
            }

            .admin-setting input, .admin-setting select {
                width: 100%;
                margin-bottom: 10px;
            }

            .save-btn {
                width: 100%;
            }

            th, td {
                font-size: 10px;
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 Admin Panel</h1>
        
        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="showTab('users')">👥 Users</button>
            <button class="tab-btn" onclick="showTab('games')">🎮 Games</button>
            <button class="tab-btn" onclick="showTab('transactions')">💰 Transactions</button>
            <button class="tab-btn" onclick="showTab('settings')">⚙️ Settings</button>
            <button class="tab-btn" onclick="window.location.href='/admin-payments.html'">💳 Payments</button>
        </div>
        
        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid" id="statsGrid"></div>
            <h3>📊 Wallet Statistics</h3>
            <div class="stats-grid" id="walletStatsGrid">
                <div class="stat-card"><h3>💰 Total Commission</h3><div class="number" id="totalCommission">0</div></div>
                <div class="stat-card"><h3>💸 Total Deposits</h3><div class="number" id="totalDeposits">0</div></div>
                <div class="stat-card"><h3>🏦 Total Withdrawals</h3><div class="number" id="totalWithdrawals">0</div></div>
            </div>
            <h3>🎮 Recent Games</h3>
            <div class="table-responsive">
                <table id="recentGames">
                    <thead>
                        <tr><th>Player</th><th>Score</th><th>Result</th><th>Date</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        
        <!-- Users Tab -->
        <div id="users" class="tab-content">
            <div class="table-responsive">
                <table id="usersTable">
                    <thead>
                        <tr><th>ID</th><th>Username</th><th>Email</th><th>Score</th><th>Games</th><th>Role</th><th>Actions</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        
        <!-- Games Tab -->
        <div id="games" class="tab-content">
            <div class="table-responsive">
                <table id="gamesTable">
                    <thead>
                        <tr><th>ID</th><th>Player</th><th>Score</th><th>Won</th><th>Date</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        
        <!-- Transactions Tab -->
        <div id="transactions" class="tab-content">
            <div class="table-responsive">
                <table id="transactionsTable">
                    <thead>
                        <tr><th>ID</th><th>User</th><th>Type</th><th>Amount</th><th>Description</th><th>Date</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        
        <!-- Settings Tab -->
        <div id="settings" class="tab-content">
            <div class="admin-setting">
                <label>⏱️ Pre-Game Timer (seconds)</label>
                <input type="number" id="timerSeconds" value="45" min="15" max="120">
                <button class="save-btn" onclick="updateTimer()">💾 UPDATE TIMER</button>
            </div>

            <div class="admin-setting">
                <label>🃏 GAME MANAGEMENT</label>
                <button class="save-btn" onclick="resetAllCards()" style="background:#dc3545; color:white;">🔄 RESET ALL CARDS FOR NEW GAME</button>
            </div>
            
            <div class="admin-setting">
                <label>🎮 GAME TIMER CONTROL</label>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                    <button class="save-btn" onclick="adminForceStart()" style="background: #48bb78; color:white;">🎮 FORCE START</button>
                    <button class="save-btn" onclick="adminPauseTimer()" style="background: #ed8936; color:white;">⏸️ PAUSE</button>
                    <button class="save-btn" onclick="adminResumeTimer()" style="background: #48bb78; color:white;">▶️ RESUME</button>
                    <button class="save-btn" onclick="adminResetTimer()" style="background: #ed8936; color:white;">🔄 RESET</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                    <button class="save-btn" onclick="adminSetTimer(30)">⏱️ SET 30s</button>
                    <button class="save-btn" onclick="adminSetTimer(45)">⏱️ SET 45s</button>
                    <button class="save-btn" onclick="adminSetTimer(60)">⏱️ SET 60s</button>
                </div>
                <div style="margin-top: 15px;">
                    <label>👥 Min Players to Start:</label>
                    <select id="minPlayersSelect" onchange="adminSetMinPlayers(this.value)">
                        <option value="2">2 Players</option>
                        <option value="3">3 Players</option>
                        <option value="4">4 Players</option>
                        <option value="5">5 Players</option>
                    </select>
                </div>
            </div>
        </div>
        
        <button onclick="goToDashboard()" class="btn-secondary">← Back to Dashboard</button>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000/api'
            : '/api';
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (event && event.target) event.target.classList.add('active');
        }
        
        async function loadAdminData() {
            try {
                const usersRes = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (usersRes.status === 403) {
                    alert('Admin access required');
                    window.location.href = '/dashboard.html';
                    return;
                }
                
                const users = await usersRes.json();
                const gamesRes = await fetch(`${API_URL}/admin/games`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const games = await gamesRes.json();
                
                const walletRes = await fetch(`${API_URL}/admin/wallet-stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const walletStats = await walletRes.json();
                
                document.getElementById('totalCommission').textContent = walletStats.totalCommission || 0;
                document.getElementById('totalDeposits').textContent = walletStats.totalDeposits || 0;
                document.getElementById('totalWithdrawals').textContent = walletStats.totalWithdrawals || 0;
                
                const totalUsers = users.length;
                const totalGames = games.length;
                const totalScore = games.reduce((sum, g) => sum + (g.score || 0), 0);
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><h3>📊 Total Users</h3><div class="number">${totalUsers}</div></div>
                    <div class="stat-card"><h3>🎮 Total Games</h3><div class="number">${totalGames}</div></div>
                    <div class="stat-card"><h3>🏆 Total Score</h3><div class="number">${totalScore}</div></div>
                `;
                
                const usersTable = document.getElementById('usersTable').querySelector('tbody');
                usersTable.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>${user.total_score || 0}</td>
                        <td>${user.games_played || 0}</td>
                        <td>
                            <select class="role-select" onchange="updateRole(${user.id}, this.value)">
                                <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                                <option value="worker" ${user.role === 'worker' ? 'selected' : ''}>Worker</option>
                                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                            </select>
                        </td>
                        <td><button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button></td>
                    </tr>
                `).join('');
                
                const gamesTable = document.getElementById('gamesTable').querySelector('tbody');
                gamesTable.innerHTML = games.map(game => `
                    <tr>
                        <td>${game.id}</td>
                        <td>${game.username}</td>
                        <td>${game.score || 0}</td>
                        <td>${game.won ? '✅ Win' : '❌ Loss'}</td>
                        <td>${new Date(game.created_at).toLocaleString()}</td>
                    </tr>
                `).join('');
                
                const recentGames = games.slice(0, 10);
                const recentTable = document.querySelector('#recentGames tbody');
                recentTable.innerHTML = recentGames.map(game => `
                    <tr>
                        <td>${game.username}</td>
                        <td>${game.score || 0}</td>
                        <td>${game.won ? '🎉 Win' : '❌ Loss'}</td>
                        <td>${new Date(game.created_at).toLocaleString()}</td>
                    </tr>
                `).join('');
                
                await loadTransactions();
                
            } catch (error) {
                console.error('Error loading admin data:', error);
            }
        }
        
        async function loadTransactions() {
            try {
                const response = await fetch(`${API_URL}/admin/transactions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const transactions = await response.json();
                
                const tbody = document.querySelector('#transactionsTable tbody');
                if (tbody) {
                    tbody.innerHTML = transactions.map(t => `
                        <tr>
                            <td>${t.id}</td>
                            <td>${t.username}</td>
                            <td>${t.type.replace('_', ' ').toUpperCase()}</td>
                            <td style="color: ${t.type === 'deposit' || t.type === 'game_win' ? '#48bb78' : t.type === 'withdraw' || t.type === 'game_loss' ? '#f56565' : '#ffd700'}">
                                ${t.type === 'deposit' || t.type === 'game_win' ? '+' : '-'} ${t.amount}
                            </td>
                            <td>${t.description || '-'}</td>
                            <td>${new Date(t.created_at).toLocaleString()}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }
        
        async function updateRole(userId, role) {
            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}/role`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ role })
                });
                
                if (response.ok) {
                    alert('Role updated successfully');
                    loadAdminData();
                } else {
                    alert('Failed to update role');
                }
            } catch (error) {
                console.error('Error updating role:', error);
            }
        }
        
        async function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user? This cannot be undone.')) {
                try {
                    const response = await fetch(`${API_URL}/admin/users/${userId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (response.ok) {
                        alert('User deleted');
                        loadAdminData();
                    } else {
                        alert('Failed to delete user');
                    }
                } catch (error) {
                    console.error('Error deleting user:', error);
                }
            }
        }
        
        async function updateTimer() {
            const timerSeconds = document.getElementById('timerSeconds').value;
            const response = await fetch(`${API_URL}/admin/timer-settings`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ timerSeconds: parseInt(timerSeconds) })
            });
            
            const data = await response.json();
            alert(data.message);
        }
        
        async function loadTimerSettings() {
            const response = await fetch(`${API_URL}/admin/timer-settings`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            document.getElementById('timerSeconds').value = data.timerSeconds;
        }
        
        async function resetAllCards() {
            if (!token) {
                alert('Not logged in');
                return;
            }
            
            if (confirm('⚠️ This will clear ALL cards and reset the game. Are you sure?')) {
                const response = await fetch('/api/game-session/admin/clear-all-cards', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                alert(data.message || 'All cards cleared for new game');
                location.reload();
            }
        }
        
        function getCurrentGameId() {
            return localStorage.getItem('currentGameId') || 'SINGLE_GAME';
        }
        
        function adminForceStart() {
            const gameId = getCurrentGameId();
            socket.emit('admin-force-start', { gameId: gameId });
            alert('Force starting game...');
        }
        
        function adminPauseTimer() {
            const gameId = getCurrentGameId();
            socket.emit('admin-pause-timer', { gameId: gameId });
            alert('Timer paused');
        }
        
        function adminResumeTimer() {
            const gameId = getCurrentGameId();
            socket.emit('admin-resume-timer', { gameId: gameId });
            alert('Timer resumed');
        }
        
        function adminResetTimer() {
            const gameId = getCurrentGameId();
            const seconds = prompt('Enter timer seconds (15-120):', '45');
            if (seconds && seconds >= 15 && seconds <= 120) {
                socket.emit('admin-reset-timer', { gameId: gameId, seconds: parseInt(seconds) });
                alert(`Timer reset to ${seconds} seconds`);
            }
        }
        
        function adminSetTimer(seconds) {
            const gameId = getCurrentGameId();
            socket.emit('admin-reset-timer', { gameId: gameId, seconds: seconds });
            alert(`Timer set to ${seconds} seconds`);
        }
        
        function adminSetMinPlayers(value) {
            const gameId = getCurrentGameId();
            socket.emit('admin-set-min-players', { gameId: gameId, minPlayers: parseInt(value) });
            alert(`Minimum players set to ${value}`);
        }
        
        function goToDashboard() {
            window.location.href = '/dashboard.html';
        }
        
        loadAdminData();
        loadTimerSettings();
    </script>
</body>
</html>
