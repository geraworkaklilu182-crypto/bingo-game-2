<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Select Your Cards - DIL BINGO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #ffd700;
            font-size: 32px;
        }

        .header p {
            color: #aaa;
            margin-top: 10px;
        }

        .wallet-box {
            background: rgba(255,215,0,0.2);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 10px;
            color: #ffd700;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-card {
            text-align: center;
            flex: 1;
        }

        .info-label {
            font-size: 11px;
            color: #888;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .selection-area {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .selection-title {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .selection-subtitle {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .select-card {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            font-weight: bold;
        }

        .select-card.selected {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            transform: scale(1.05);
        }

        .select-card.taken {
            background: #dc3545;
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .select-card:hover:not(.taken):not(.selected) {
            background: rgba(255,215,0,0.3);
            transform: scale(1.05);
        }

        .selected-info {
            text-align: center;
            margin: 15px 0;
            font-size: 16px;
            color: #ffd700;
        }

        .confirm-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #48bb78, #38a169);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .confirm-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .confirm-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(72,187,120,0.4);
        }

        .back-btn {
            margin-top: 20px;
            text-align: center;
        }

        .back-btn button {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .numbers-grid {
                grid-template-columns: repeat(10, 1fr);
                gap: 5px;
            }
            .select-card {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 DIL BINGO</h1>
            <p>Select your cards to join the game</p>
            <div class="wallet-box">💰 Balance: <span id="walletBalance">0</span> birr</div>
        </div>

        <div class="info-bar">
            <div class="info-card">
                <div class="info-label">ACTIVE PLAYERS</div>
                <div class="info-value" id="playerCount">0</div>
            </div>
            <div class="info-card">
                <div class="info-label">GAME STATUS</div>
                <div class="info-value" id="gameStatus">WAITING</div>
            </div>
            <div class="info-card">
                <div class="info-label">CARD COST</div>
                <div class="info-value" id="cardCost">10</div>
            </div>
        </div>

        <div class="selection-area">
            <div class="selection-title">🎴 CHOOSE YOUR CARDS</div>
            <div class="selection-subtitle">Click on cards to select/unselect (Maximum 2 cards) - Each card costs <span id="costDisplay">10</span> birr</div>
            
            <div class="numbers-grid" id="numbersGrid"></div>
            
            <div class="selected-info" id="selectedInfo">Selected: 0/2 cards</div>
            <button class="confirm-btn" id="confirmBtn" onclick="confirmAndJoin()" disabled>✅ CONFIRM & JOIN GAME</button>
        </div>

        <div class="back-btn">
            <button onclick="goBack()">← Back to Dashboard</button>
        </div>
    </div>

    <script>
        //const API_URL = '/api';
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:3000/api'
    : '/api';

        const token = localStorage.getItem('token');
        let myWallet = 0;
        let selectedCards = [];
        let takenCards = [];
        let playerCount = 0;
        let gameStatus = 'waiting';
        let cardCost = 10;
        let refreshInterval = null;

        if (!token) {
            window.location.href = '/login.html';
        }

        // ========== SINGLE loadData() FUNCTION ==========
        async function loadData() {
            try {
                // FIRST: Clear any old cards from previous session
                await fetch(`${API_URL}/game-session/clear-cards`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                // Load wallet balance
                const walletRes = await fetch(`${API_URL}/wallet/balance`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const walletData = await walletRes.json();
                myWallet = walletData.balance;
                document.getElementById('walletBalance').textContent = myWallet;
                document.getElementById('cardCost').textContent = cardCost;
                document.getElementById('costDisplay').textContent = cardCost;

                // Load game state
                const gameRes = await fetch(`${API_URL}/game-session/state`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const gameData = await gameRes.json();
                
                playerCount = gameData.players || 0;
                gameStatus = gameData.game?.status || 'waiting';
                takenCards = gameData.takenCards || [];
                
                document.getElementById('playerCount').textContent = playerCount;
                document.getElementById('gameStatus').textContent = gameStatus === 'active' ? 'IN PROGRESS' : 'WAITING';
                
                renderNumberGrid();
                
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }
        // ========== END OF loadData() ==========

        function renderNumberGrid() {
            const container = document.getElementById('numbersGrid');
            container.innerHTML = '';
            
            for (let i = 1; i <= 300; i++) {
                const div = document.createElement('div');
                div.className = 'select-card';
                div.textContent = i;
                
                if (takenCards.includes(i)) {
                    div.classList.add('taken');
                }
                if (selectedCards.includes(i)) {
                    div.classList.add('selected');
                }
                if (!takenCards.includes(i)) {
                    div.onclick = () => toggleSelect(i);
                }
                container.appendChild(div);
            }
            
            updateSelectedInfo();
        }

        function toggleSelect(cardNumber) {
            if (takenCards.includes(cardNumber)) {
                alert('This card is already taken by another player!');
                return;
            }
            
            if (selectedCards.includes(cardNumber)) {
                selectedCards = selectedCards.filter(c => c !== cardNumber);
            } else if (selectedCards.length < 2) {
                selectedCards.push(cardNumber);
            } else {
                alert('You can only select maximum 2 cards!');
                return;
            }
            
            renderNumberGrid();
        }

        function updateSelectedInfo() {
            const infoDiv = document.getElementById('selectedInfo');
            const confirmBtn = document.getElementById('confirmBtn');
            const totalCost = selectedCards.length * cardCost;
            
            infoDiv.innerHTML = `Selected: ${selectedCards.length}/2 cards (Total cost: ${totalCost} birr)`;
            confirmBtn.disabled = selectedCards.length === 0 || myWallet < totalCost;
            
            if (myWallet < totalCost && selectedCards.length > 0) {
                infoDiv.innerHTML += ` ⚠️ Insufficient balance! Need ${totalCost - myWallet} more birr`;
                infoDiv.style.color = '#f56565';
            } else {
                infoDiv.style.color = '#ffd700';
            }
        }

        async function confirmAndJoin() {
    if (selectedCards.length === 0) {
        alert('Please select at least 1 card!');
        return;
    }
    
    const totalCost = selectedCards.length * cardCost;
    if (myWallet < totalCost) {
        alert(`Insufficient balance! Need ${totalCost} birr. Please deposit first.`);
        window.location.href = '/wallet.html';
        return;
    }
    
    // Show loading state
    const confirmBtn = document.getElementById('confirmBtn');
    confirmBtn.textContent = '⏳ PROCESSING...';
    confirmBtn.disabled = true;
    
    let success = true;
    
    for (const cardNumber of selectedCards) {
        const cardData = generateCardData(cardNumber);
        
        try {
            const response = await fetch(`${API_URL}/game-session/select-card`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ cardNumber: cardNumber, cardData: cardData })
            });
            
            if (!response.ok) {
                const error = await response.json();
                alert(error.message);
                success = false;
                break;
            }
        } catch (error) {
            console.error('Error selecting card:', error);
            alert('Server error. Please try again.');
            success = false;
            break;
        }
    }
    
    if (success) {
        // Clear any existing game data and force fresh join
        localStorage.removeItem('hasJoinedGame');
        
        // Redirect to game with a cache-busting parameter
        window.location.href = '/multiplayer-arena.html?t=' + Date.now();
    } else {
        confirmBtn.textContent = '✅ CONFIRM & JOIN GAME';
        confirmBtn.disabled = false;
    }
}

        function generateCardData(cardNumber) {
            const ranges = [{min:1,max:15},{min:16,max:30},{min:31,max:45},{min:46,max:60},{min:61,max:75}];
            const numbers = [[],[],[],[],[]];
            for (let col = 0; col < 5; col++) {
                const colNums = [];
                while (colNums.length < 5) {
                    const num = Math.floor(Math.random() * (ranges[col].max - ranges[col].min + 1)) + ranges[col].min;
                    if (!colNums.includes(num)) colNums.push(num);
                }
                colNums.sort((a,b)=>a-b);
                for (let row = 0; row < 5; row++) numbers[row][col] = colNums[row];
            }
            numbers[2][2] = '★';
            return numbers;
        }

        function goBack() {
            window.location.href = '/dashboard.html';
        }

        // Load data and refresh every 5 seconds
        loadData();
        refreshInterval = setInterval(loadData, 5000);
    </script>
</body>
</html>
