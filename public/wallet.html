<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wallet - DIL BINGO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-icon {
            font-size: 40px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .title h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-2px);
        }

        /* Balance Card */
        .balance-card {
            background: #0d0d0d;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .balance-label {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .balance-amount {
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Actions Grid */
        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .action-card {
            background: #0d0d0d;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.1);
        }

        .action-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,215,0,0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .action-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .action-desc {
            color: #888;
            font-size: 12px;
        }

        /* Transactions */
        .transactions {
            background: #0d0d0d;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,215,0,0.1);
        }

        .transactions h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .transaction-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .transaction-deposit { color: #48bb78; }
        .transaction-withdraw { color: #f56565; }
        .transaction-game_win { color: #48bb78; }
        .transaction-game_loss { color: #f56565; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0d0d0d;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .modal-content h2 {
            color: #ffd700;
            margin-bottom: 15px;
        }

        .modal-content p {
            color: #aaa;
            font-size: 14px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }

        .cancel-btn {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* Message */
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(72,187,120,0.2);
            color: #48bb78;
            display: block;
            border: 1px solid #48bb78;
        }

        .message.error {
            background: rgba(245,101,101,0.2);
            color: #f56565;
            display: block;
            border: 1px solid #f56565;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            .page-header {
                flex-direction: column;
                text-align: center;
            }

            .title h1 {
                font-size: 24px;
            }

            .title-icon {
                font-size: 32px;
            }

            .balance-amount {
                font-size: 42px;
            }

            .actions {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .action-card {
                padding: 20px;
            }

            .action-icon {
                font-size: 36px;
            }

            .transaction-item {
                flex-direction: column;
                text-align: center;
            }

            .back-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <div class="title">
                <span class="title-icon">💰</span>
                <h1>My Wallet</h1>
            </div>
            <button class="back-btn" onclick="goToDashboard()">← Back to Dashboard</button>
        </div>

        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-label">💰 Your Balance</div>
            <div class="balance-amount" id="balance">0</div>
            <div style="margin-top: 15px; font-size: 12px; color: #666;">
                Min deposit: 10 | Max deposit: 200
            </div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <div class="action-card" onclick="showDepositModal()">
                <div class="action-icon">💰</div>
                <div class="action-title">Deposit</div>
                <div class="action-desc">Add money to your wallet (10-200 coins)</div>
            </div>
            <div class="action-card" onclick="showWithdrawModal()">
                <div class="action-icon">💸</div>
                <div class="action-title">Withdraw</div>
                <div class="action-desc">Withdraw your winnings</div>
            </div>
        </div>

        <!-- Transactions -->
        <div class="transactions">
            <h3>📜 Recent Transactions</h3>
            <div id="transactionsList">Loading...</div>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h2>💰 Deposit Coins</h2>
            <p>Enter amount (10 - 200 coins)</p>
            <input type="number" id="depositAmount" placeholder="Amount" min="10" max="200">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="deposit()">Confirm</button>
                <button class="cancel-btn" onclick="closeModal('depositModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h2>💸 Withdraw Coins</h2>
            <p>Enter amount to withdraw</p>
            <input type="number" id="withdrawAmount" placeholder="Amount" min="1">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="withdraw()">Confirm</button>
                <button class="cancel-btn" onclick="closeModal('withdrawModal')">Cancel</button>
            </div>
        </div>
    </div>

    <div id="message" style="position: fixed; top: 20px; right: 20px; z-index: 1001;"></div>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000/api'
            : '/api';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '/login.html';
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }

        async function loadBalance() {
            try {
                const response = await fetch(`${API_URL}/wallet/balance`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                document.getElementById('balance').textContent = data.balance;
            } catch (error) {
                console.error('Error loading balance:', error);
            }
        }

        async function loadTransactions() {
            try {
                const response = await fetch(`${API_URL}/wallet/transactions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const transactions = await response.json();

                const container = document.getElementById('transactionsList');
                if (transactions.length === 0) {
                    container.innerHTML = '<p style="color:#888;">No transactions yet</p>';
                    return;
                }

                container.innerHTML = transactions.map(t => `
                    <div class="transaction-item">
                        <span>${t.type.replace('_', ' ').toUpperCase()}</span>
                        <span class="transaction-${t.type}">${t.amount > 0 ? '+' : ''}${t.amount} coins</span>
                        <span style="font-size: 11px; color: #666;">${new Date(t.created_at).toLocaleString()}</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }

        function showDepositModal() {
            document.getElementById('depositModal').style.display = 'flex';
        }

        function showWithdrawModal() {
            document.getElementById('withdrawModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        async function deposit() {
            const amount = parseInt(document.getElementById('depositAmount').value);

            if (isNaN(amount) || amount < 10 || amount > 200) {
                showMessage('Amount must be between 10 and 200 coins', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/wallet/deposit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    closeModal('depositModal');
                    document.getElementById('depositAmount').value = '';
                    loadBalance();
                    loadTransactions();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Network error', 'error');
            }
        }

        async function withdraw() {
            const amount = parseInt(document.getElementById('withdrawAmount').value);

            if (isNaN(amount) || amount <= 0) {
                showMessage('Please enter a valid amount', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/wallet/withdraw`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    closeModal('withdrawModal');
                    document.getElementById('withdrawAmount').value = '';
                    loadBalance();
                    loadTransactions();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Network error', 'error');
            }
        }

        function goToDashboard() {
            window.location.href = '/dashboard.html';
        }

        loadBalance();
        loadTransactions();

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
