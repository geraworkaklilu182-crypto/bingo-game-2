<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Bingo Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .balance-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .balance-label {
            font-size: 18px;
            color: #718096;
            margin-bottom: 10px;
        }
        
        .balance-amount {
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .action-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .action-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .action-title {
            font-size: 20px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }
        
        .action-desc {
            color: #718096;
            font-size: 14px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .confirm-btn {
            background: #667eea;
            color: white;
        }
        
        .cancel-btn {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .transactions {
            background: white;
            border-radius: 20px;
            padding: 25px;
        }
        
        .transactions h3 {
            margin-bottom: 20px;
            color: #2d3748;
        }
        
        .transaction-item {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .transaction-deposit { color: #48bb78; }
        .transaction-withdraw { color: #f56565; }
        .transaction-game_win { color: #48bb78; }
        .transaction-game_loss { color: #f56565; }
        
        .back-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: #718096;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .message.success {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .message.error {
            background: #fed7d7;
            color: #c53030;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="balance-card">
            <div class="balance-label">💰 Your Balance</div>
            <div class="balance-amount" id="balance">0</div>
            <div style="margin-top: 15px; font-size: 14px; color: #718096;">
                Min deposit: 10 | Max deposit: 200
            </div>
        </div>
        
        <div class="actions">
            <div class="action-card" onclick="showDepositModal()">
                <div class="action-icon">💰</div>
                <div class="action-title">Deposit</div>
                <div class="action-desc">Add money to your wallet (10-200 coins)</div>
            </div>
            <div class="action-card" onclick="showWithdrawModal()">
                <div class="action-icon">💸</div>
                <div class="action-title">Withdraw</div>
                <div class="action-desc">Withdraw your winnings</div>
            </div>
        </div>
        
        <div class="transactions">
            <h3>📜 Recent Transactions</h3>
            <div id="transactionsList">Loading...</div>
        </div>
        
        <button class="back-btn" onclick="goToDashboard()">← Back to Dashboard</button>
    </div>
    
    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h2>💰 Deposit Coins</h2>
            <p>Enter amount (10 - 200 coins)</p>
            <input type="number" id="depositAmount" placeholder="Amount" min="10" max="200">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="deposit()">Confirm</button>
                <button class="cancel-btn" onclick="closeModal('depositModal')">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h2>💸 Withdraw Coins</h2>
            <p>Enter amount to withdraw</p>
            <input type="number" id="withdrawAmount" placeholder="Amount" min="1">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="withdraw()">Confirm</button>
                <button class="cancel-btn" onclick="closeModal('withdrawModal')">Cancel</button>
            </div>
        </div>
    </div>
    
    <div id="message" style="position: fixed; top: 20px; right: 20px; z-index: 1001;"></div>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }
        
        async function loadBalance() {
            try {
                const response = await fetch(`${API_URL}/wallet/balance`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                document.getElementById('balance').textContent = data.balance;
            } catch (error) {
                console.error('Error loading balance:', error);
            }
        }
        
        async function loadTransactions() {
            try {
                const response = await fetch(`${API_URL}/wallet/transactions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const transactions = await response.json();
                
                const container = document.getElementById('transactionsList');
                if (transactions.length === 0) {
                    container.innerHTML = '<p>No transactions yet</p>';
                    return;
                }
                
                container.innerHTML = transactions.map(t => `
                    <div class="transaction-item">
                        <span>${t.type.replace('_', ' ').toUpperCase()}</span>
                        <span class="transaction-${t.type}">${t.amount > 0 ? '+' : ''}${t.amount} coins</span>
                        <span style="font-size: 12px; color: #718096;">${new Date(t.created_at).toLocaleString()}</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }
        
        function showDepositModal() {
            document.getElementById('depositModal').style.display = 'flex';
        }
        
        function showWithdrawModal() {
            document.getElementById('withdrawModal').style.display = 'flex';
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        async function deposit() {
            const amount = parseInt(document.getElementById('depositAmount').value);
            
            if (isNaN(amount) || amount < 10 || amount > 200) {
                showMessage('Amount must be between 10 and 200 coins', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/wallet/deposit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(data.message, 'success');
                    closeModal('depositModal');
                    document.getElementById('depositAmount').value = '';
                    loadBalance();
                    loadTransactions();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Network error', 'error');
            }
        }
        
        async function withdraw() {
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            
            if (isNaN(amount) || amount <= 0) {
                showMessage('Please enter a valid amount', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/wallet/withdraw`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(data.message, 'success');
                    closeModal('withdrawModal');
                    document.getElementById('withdrawAmount').value = '';
                    loadBalance();
                    loadTransactions();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Network error', 'error');
            }
        }
        
        function goToDashboard() {
            window.location.href = '/dashboard.html';
        }
        
        loadBalance();
        loadTransactions();
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
