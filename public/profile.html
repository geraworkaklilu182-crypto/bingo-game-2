<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>User Profile - DIL BINGO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-icon {
            font-size: 40px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .title h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-2px);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #0d0d0d;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,215,0,0.3);
        }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Profile Card */
        .profile-card {
            background: #0d0d0d;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .profile-title {
            color: #ffd700;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .info-label {
            width: 120px;
            color: #aaa;
            font-size: 14px;
        }

        .info-value {
            flex: 1;
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .info-value input {
            width: 100%;
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .info-value input:disabled {
            background: #0d0d0d;
            color: #888;
        }

        .edit-btn, .save-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .edit-btn {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .save-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }

        .edit-btn:hover, .save-btn:hover {
            transform: translateY(-2px);
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(72,187,120,0.2);
            color: #48bb78;
            display: block;
            border: 1px solid #48bb78;
        }

        .message.error {
            background: rgba(245,101,101,0.2);
            color: #f56565;
            display: block;
            border: 1px solid #f56565;
        }

        /* Responsive */
        @media (max-width: 700px) {
            body {
                padding: 15px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .info-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .info-label {
                width: 100%;
            }

            .profile-card {
                padding: 20px;
            }

            .title h1 {
                font-size: 24px;
            }

            .title-icon {
                font-size: 32px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                text-align: center;
            }

            .back-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <div class="title">
                <span class="title-icon">👤</span>
                <h1>User Profile</h1>
            </div>
            
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-value" id="totalScore">0</div>
                <div class="stat-label">TOTAL SCORE</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎮</div>
                <div class="stat-value" id="gamesPlayed">0</div>
                <div class="stat-label">GAMES PLAYED</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✨</div>
                <div class="stat-value" id="gamesWon">0</div>
                <div class="stat-label">GAMES WON</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="winRate">0%</div>
                <div class="stat-label">WIN RATE</div>
            </div>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
            <div class="profile-title">
                <span>✏️</span> Edit Profile
            </div>

            <div id="message" class="message"></div>

            <div class="profile-info">
                <div class="info-row">
                    <div class="info-label">👤 Username</div>
                    <div class="info-value">
                        <input type="text" id="username" disabled>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-label">📧 Email</div>
                    <div class="info-value">
                        <input type="email" id="email" disabled>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-label">🔒 New Password</div>
                    <div class="info-value">
                        <input type="password" id="newPassword" placeholder="Leave blank to keep current">
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-label">👑 Role</div>
                    <div class="info-value" id="role">user</div>
                </div>
                <div class="info-row">
                    <div class="info-label">📅 Member Since</div>
                    <div class="info-value" id="joinedDate">-</div>
                </div>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap;">
                <button onclick="toggleEdit()" id="editBtn" class="edit-btn">✏️ Edit Profile</button>
                <button onclick="saveProfile()" id="saveBtn" class="save-btn" style="display:none;">💾 Save Changes</button>
            </div>

            <!-- Back button moved to bottom -->
<div style="margin-top: 20px;">
    <button onclick="goToDashboard()" class="back-btn" style="width: 100%; justify-content: center;">← Back to Dashboard</button>
</div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000/api'
            : '/api';
        const token = localStorage.getItem('token');
        let isEditing = false;
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        async function loadProfile() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }
                
                const user = await response.json();
                
                document.getElementById('username').value = user.username;
                document.getElementById('email').value = user.email;
                document.getElementById('totalScore').textContent = user.total_score || 0;
                document.getElementById('gamesPlayed').textContent = user.games_played || 0;
                document.getElementById('gamesWon').textContent = user.games_won || 0;
                document.getElementById('role').textContent = user.role || 'user';
                
                const winRate = user.games_played > 0 
                    ? ((user.games_won / user.games_played) * 100).toFixed(1)
                    : 0;
                document.getElementById('winRate').textContent = `${winRate}%`;
                
                const joinedDate = new Date(user.created_at).toLocaleDateString();
                document.getElementById('joinedDate').textContent = joinedDate;
                
                // Animate stats
                animateValue('totalScore', 0, user.total_score || 0, 1000);
                animateValue('gamesPlayed', 0, user.games_played || 0, 1000);
                animateValue('gamesWon', 0, user.games_won || 0, 1000);
                
            } catch (error) {
                console.error('Error loading profile:', error);
                showMessage('Error loading profile', 'error');
            }
        }
        
        function animateValue(elementId, start, end, duration) {
            const element = document.getElementById(elementId);
            if (!element) return;
            const range = end - start;
            const increment = range / (duration / 16);
            let current = start;
            const timer = setInterval(() => {
                current += increment;
                if (current >= end) {
                    element.textContent = end;
                    clearInterval(timer);
                } else {
                    element.textContent = Math.floor(current);
                }
            }, 16);
        }
        
        function toggleEdit() {
            isEditing = !isEditing;
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const editBtn = document.getElementById('editBtn');
            const saveBtn = document.getElementById('saveBtn');
            
            if (isEditing) {
                usernameInput.disabled = false;
                emailInput.disabled = false;
                editBtn.style.display = 'none';
                saveBtn.style.display = 'inline-block';
            } else {
                usernameInput.disabled = true;
                emailInput.disabled = true;
                editBtn.style.display = 'inline-block';
                saveBtn.style.display = 'none';
                loadProfile();
            }
        }
        
        async function saveProfile() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/user/update`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password: newPassword || undefined
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Profile updated successfully!', 'success');
                    toggleEdit();
                    document.getElementById('newPassword').value = '';
                    loadProfile();
                } else {
                    showMessage(data.message || 'Error updating profile', 'error');
                }
                
            } catch (error) {
                console.error('Error saving profile:', error);
                showMessage('Error saving profile', 'error');
            }
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
                messageDiv.className = 'message';
            }, 3000);
        }
        
        function goToDashboard() {
            window.location.href = '/dashboard.html';
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }
        
        loadProfile();
    </script>
</body>
</html>
