<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-form {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .form-group input:disabled {
            background: #f5f5f5;
            color: #666;
        }
        
        .edit-btn {
            background: #48bb78;
            margin-top: 10px;
        }
        
        .save-btn {
            background: #667eea;
        }
        
        .stats-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .stats-card h3 {
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .stats-card p {
            margin: 10px 0;
            font-size: 16px;
        }
        
        .success-message {
            background: #48bb78;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .error-message {
            background: #f56565;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 User Profile</h1>
        
        <div id="message"></div>
        
        <div class="stats-card">
            <h3>📊 Game Statistics</h3>
            <p>🏆 Total Score: <strong id="totalScore">0</strong></p>
            <p>🎮 Games Played: <strong id="gamesPlayed">0</strong></p>
            <p>✨ Games Won: <strong id="gamesWon">0</strong></p>
            <p>📈 Win Rate: <strong id="winRate">0%</strong></p>
            <p>👑 Role: <strong id="role"></strong></p>
            <p>📅 Member Since: <strong id="joinedDate"></strong></p>
        </div>
        
        <div class="profile-form">
            <h3>✏️ Edit Profile</h3>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" disabled>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" disabled>
            </div>
            <div class="form-group">
                <label>New Password (leave blank to keep current)</label>
                <input type="password" id="newPassword" placeholder="Enter new password">
            </div>
            <button onclick="toggleEdit()" id="editBtn" class="btn-primary">✏️ Edit Profile</button>
            <button onclick="saveProfile()" id="saveBtn" class="btn-primary save-btn" style="display:none;">💾 Save Changes</button>
            <button onclick="goToDashboard()" class="btn-secondary" style="margin-top: 10px;">← Back to Dashboard</button>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:/api';
        const token = localStorage.getItem('token');
        let isEditing = false;
        
        if (!token) {
            window.location.href = '/index.html';
        }
        
        async function loadProfile() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }
                
                const user = await response.json();
                
                document.getElementById('username').value = user.username;
                document.getElementById('email').value = user.email;
                document.getElementById('totalScore').textContent = user.total_score || 0;
                document.getElementById('gamesPlayed').textContent = user.games_played || 0;
                document.getElementById('gamesWon').textContent = user.games_won || 0;
                document.getElementById('role').textContent = user.role || 'user';
                
                const winRate = user.games_played > 0 
                    ? ((user.games_won / user.games_played) * 100).toFixed(1)
                    : 0;
                document.getElementById('winRate').textContent = `${winRate}%`;
                
                const joinedDate = new Date(user.created_at).toLocaleDateString();
                document.getElementById('joinedDate').textContent = joinedDate;
                
            } catch (error) {
                console.error('Error loading profile:', error);
                showMessage('Error loading profile', 'error');
            }
        }
        
        function toggleEdit() {
            isEditing = !isEditing;
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const editBtn = document.getElementById('editBtn');
            const saveBtn = document.getElementById('saveBtn');
            
            if (isEditing) {
                usernameInput.disabled = false;
                emailInput.disabled = false;
                editBtn.style.display = 'none';
                saveBtn.style.display = 'inline-block';
            } else {
                usernameInput.disabled = true;
                emailInput.disabled = true;
                editBtn.style.display = 'inline-block';
                saveBtn.style.display = 'none';
                loadProfile(); // Reload original data
            }
        }
        
        async function saveProfile() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/user/update`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password: newPassword || undefined
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Profile updated successfully!', 'success');
                    toggleEdit();
                    document.getElementById('newPassword').value = '';
                    loadProfile();
                } else {
                    showMessage(data.message || 'Error updating profile', 'error');
                }
                
            } catch (error) {
                console.error('Error saving profile:', error);
                showMessage('Error saving profile', 'error');
            }
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="${type}-message">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }
        
        function goToDashboard() {
            window.location.href = '/dashboard.html';
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        }
        
        loadProfile();
    </script>
</body>
</html>
